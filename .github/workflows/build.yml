name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2
      - name: Build
        run: cargo tauri build --ci
      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: inspiration-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: inspiration-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2
      - name: Build
        run: cargo tauri build --ci
      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: inspiration-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2
      - name: Build
        run: cargo tauri build --ci
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: inspiration-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: inspiration-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            inspiration-linux-deb/*.deb
            inspiration-linux-appimage/*.AppImage
            inspiration-macos-dmg/*.dmg
            inspiration-windows-msi/*.msi
            inspiration-windows-exe/*.exe
          generate_release_notes: true
